<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Plain Text Responder</title>
</head>
<body>
    <pre id="output"></pre>
    
    <script>
        // Get everything after the # in the URL
        let hash = window.location.hash.substring(1); // removes the #
        
        // Convert dashes to spaces
        let textResponse = hash.replace(/-/g, ' ');
        
        // If nothing after #, show default
        if (textResponse === "") {
            textResponse = "Hello world";
        }
        
        document.getElementById('output').innerText = textResponse;
    </script>
</body>
</html>
