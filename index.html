<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Plain Text Responder</title>
</head>
<body>
    <pre id="output"></pre>
    
    <script>
        // Get the full path (e.g., "/PlainText/hi-how-are-you")
        let fullPath = window.location.pathname;
        
        // Remove the base folder name "/PlainText/" from the beginning
        let basePath = "/PlainText/";
        let cleanPath = fullPath.startsWith(basePath) 
            ? fullPath.substring(basePath.length) 
            : fullPath.substring(1);
        
        // Remove trailing slash if present
        if (cleanPath.endsWith("/")) {
            cleanPath = cleanPath.slice(0, -1);
        }
        
        // Convert dashes to spaces
        let textResponse = cleanPath.replace(/-/g, ' ');
        
        // If nothing after the folder name, show default message
        if (textResponse === "") {
            textResponse = "Hello world";
        }
        
        // Display as plain text
        document.getElementById('output').innerText = textResponse;
    </script>
</body>
</html>
